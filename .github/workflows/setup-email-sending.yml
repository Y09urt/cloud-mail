name: Setup Cloudflare Email Sending

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DOMAIN: yogurts.top

    steps:
      - name: Check required secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Show existing Email Sending domains
        continue-on-error: true
        run: npx wrangler@latest email sending list

      - name: Enable Email Sending for domain
        run: npx wrangler@latest email sending enable "$DOMAIN"

      - name: Show Email Sending DNS records
        continue-on-error: true
        run: npx wrangler@latest email sending dns get "$DOMAIN"
